/devices/{device_id}/history/resource:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/FromQuery'
    - $ref: '../components/parameters.yaml#/ToQuery'
    - $ref: '../components/parameters.yaml#/IntervalQuery'
  get:
    tags: [History]
    summary: Query historical system resource
    description: |
      InfluxDB query untuk data resource (CPU/memory/HDD) historis. Kolom
      umum di tiap row: `time, cpu_load, free_memory, free_hdd_space`.
      Bucket interval default `1m`.
    responses:
      '200':
        description: History rows
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/history.yaml#/HistoryRow' }
      '400': { $ref: '../components/responses.yaml#/ErrorBadRequest' }
      '503': { $ref: '../components/responses.yaml#/ErrorServiceUnavailable' }

