/devices/{device_id}/network/interfaces:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
  get:
    tags: [Network]
    summary: List interfaces
    responses:
      '200':
        description: Interface list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/network.yaml#/InterfaceResponse' }

/devices/{device_id}/network/pools:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/CacheQuery'
    - $ref: '../components/parameters.yaml#/TtlQuery'
  get:
    tags: [Network]
    summary: List IP pools
    responses:
      '200':
        description: Pool list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/network.yaml#/IPPoolResponse' }

/devices/{device_id}/network/arp:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - name: mac
      in: query
      required: true
      description: MAC address (WAJIB untuk endpoint ini).
      schema:
        type: string
        pattern: "^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$"
        example: "AA:BB:CC:DD:EE:FF"
  get:
    tags: [Network]
    summary: List ARP entries by MAC
    description: Filter ARP entry berdasarkan MAC address. Query `mac` WAJIB.
    responses:
      '200':
        description: ARP entries
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/network.yaml#/ARPEntryResponse' }
      '400': { $ref: '../components/responses.yaml#/ErrorBadRequest' }

/devices/{device_id}/network/arp/{id}:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IdPath'
  delete:
    tags: [Network]
    summary: Delete ARP entry
    responses:
      '204': { $ref: '../components/responses.yaml#/NoContentResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorNotFound' }

/devices/{device_id}/network/dhcp-leases:
