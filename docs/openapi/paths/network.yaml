        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/network.yaml#/QueueSimpleResponse' }

/devices/{device_id}/network/queues/{id}:
