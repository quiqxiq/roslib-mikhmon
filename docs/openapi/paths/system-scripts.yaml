/devices/{device_id}/system/scripts:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
  get:
    tags: [System Scripts]
    summary: List scripts
    description: |
      List `/system/script`. Bisa filter via query: `?name=`, `?comment=`,
      `?owner=`, `?source=` (substring match).
    parameters:
      - $ref: '../components/parameters.yaml#/NameQuery'
      - $ref: '../components/parameters.yaml#/CommentQuery'
      - $ref: '../components/parameters.yaml#/OwnerQuery'
      - $ref: '../components/parameters.yaml#/SourceQuery'
    responses:
      '200':
        description: Script list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/system.yaml#/ScriptResponse' }
      '500': { $ref: '../components/responses.yaml#/ErrorInternal' }

  post:
    tags: [System Scripts]
    summary: Create script
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/system.yaml#/ScriptCreateRequest' }
          examples:
            on_login:
              summary: Script on-login
              value:
                name: "on-login-user01"
                source: ":log info \"login $user from $address\";"
                comment: "auto-generated by mikhmon"
                policy: "read,write,policy,test"
    responses:
      '201':
        description: Script created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data: { $ref: '../schemas/envelope.yaml#/IDResponse' }
      '400': { $ref: '../components/responses.yaml#/ErrorValidation' }
      '500': { $ref: '../components/responses.yaml#/ErrorInternal' }

/devices/{device_id}/system/scripts/{id}:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IdPath'
  get:
    tags: [System Scripts]
    summary: Get script by ID
    responses:
      '200':
        description: Script detail
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data: { $ref: '../schemas/system.yaml#/ScriptResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorNotFound' }
  put:
    tags: [System Scripts]
    summary: Update script
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/system.yaml#/ScriptUpdateRequest' }
    responses:
      '204': { $ref: '../components/responses.yaml#/NoContentResponse' }
      '400': { $ref: '../components/responses.yaml#/ErrorValidation' }
      '404': { $ref: '../components/responses.yaml#/ErrorNotFound' }
  delete:
    tags: [System Scripts]
    summary: Delete script
    responses:
      '204': { $ref: '../components/responses.yaml#/NoContentResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorNotFound' }
