/devices/{device_id}/hotspot/servers:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/CacheQuery'
    - $ref: '../components/parameters.yaml#/TtlQuery'
  get:
    tags: [Hotspot Misc]
    summary: List hotspot servers
    responses:
      '200':
        description: Server list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/hotspot.yaml#/HotspotServerResponse' }

/devices/{device_id}/hotspot/active:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/ServerQuery'
  get:
    tags: [Hotspot Sessions]
    summary: List active sessions
    description: List session hotspot yang sedang aktif (sudah login). Filter `?server=`.
    responses:
      '200':
        description: Active session list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../schemas/hotspot.yaml#/HotspotActiveResponse' }

/devices/{device_id}/hotspot/active/count:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/ServerQuery'
  get:
    tags: [Hotspot Sessions]
    summary: Count active sessions
    responses:
      '200':
        description: Count
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data: { $ref: '../schemas/envelope.yaml#/CountResponse' }

/devices/{device_id}/hotspot/active/{id}:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IdPath'
  get:
    tags: [Hotspot Sessions]
    summary: Get active session by ID
    responses:
      '200':
        description: Session detail
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/envelope.yaml#/Envelope'
                - type: object
                  properties:
                    data: { $ref: '../schemas/hotspot.yaml#/HotspotActiveResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorNotFound' }
  delete:
    tags: [Hotspot Sessions]
    summary: Kick (disconnect) session
    description: |
      Workflow KickActive: hapus cookie user (anti auto-relogin) → hapus
      active record. Tidak hapus user dari `/hotspot/user`.
    responses:
      '204': { $ref: '../components/responses.yaml#/NoContentResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorNotFound' }

