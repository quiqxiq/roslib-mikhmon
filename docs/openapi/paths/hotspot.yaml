/devices/{device_id}/hotspot/bindings/{id}/type:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IdPath'
  patch:
    tags: [Hotspot Misc]
    summary: Set binding type
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/hotspot.yaml#/SetBindingTypeRequest' }
          examples:
            bypassed:
              summary: Bypass captive portal
              value: { type: "bypassed" }
            blocked:
              summary: Blokir total MAC
              value: { type: "blocked" }
    responses:
      '204': { $ref: '../components/responses.yaml#/NoContentResponse' }
      '400': { $ref: '../components/responses.yaml#/ErrorValidation' }

/devices/{device_id}/hotspot/bindings/{id}/disabled:
