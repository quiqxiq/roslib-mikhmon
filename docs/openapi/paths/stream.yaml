/devices/{device_id}/stream/hotspot/active:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/ModeQuery'
  get:
    tags: [Streaming]
    summary: Stream hotspot active sessions (SSE)
    description: |
      Server-Sent Events stream untuk session hotspot.

      **Format event**:
      ```
      event: change
      id: <event-id>
      data: <HotspotActiveEvent JSON>

      ```

      **Default mode**: snapshot+follow. Subscribe akan kirim snapshot row
      yang aktif sekarang, lalu follow delta. Pakai `?mode=follow-only`
      untuk skip snapshot.

      Broker auto-stop saat last subscriber leave; multi-subscriber per
      topic share single backend stream ke router.

      **Sentinel field**: `dead: true` artinya session terminate.
      ID-nya tetap valid untuk cross-ref snapshot.
    x-event-types: [change]
    responses:
      '200':
        description: SSE stream (Content-Type text/event-stream)
        content:
          text/event-stream:
            schema: { $ref: '../schemas/stream-events.yaml#/HotspotActiveEvent' }
      '404': { $ref: '../components/responses.yaml#/ErrorDeviceNotFound' }

/devices/{device_id}/stream/hotspot/users:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/ModeQuery'
  get:
    tags: [Streaming]
    summary: Stream hotspot users table (SSE)
    description: |
      SSE delta dari `/ip/hotspot/user/print follow`. Default mode mengirim
      snapshot awal lalu delta; `?mode=follow-only` hanya delta baru.
      Event `change` memakai payload `HotspotUserEvent`.
    x-event-types: [change]
    responses:
      '200':
        description: SSE stream
        content:
          text/event-stream:
            schema: { $ref: '../schemas/stream-events.yaml#/HotspotUserEvent' }
      '404': { $ref: '../components/responses.yaml#/ErrorDeviceNotFound' }

/devices/{device_id}/stream/hotspot/inactive:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
