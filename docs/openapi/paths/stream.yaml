      ```
      event: log
      id: <event-id>
      data: <LogEvent JSON>

      ```
    x-event-types: [log]
    responses:
      '200':
        description: SSE stream
        content:
          text/event-stream:
            schema: { $ref: '../schemas/stream-events.yaml#/LogEvent' }
