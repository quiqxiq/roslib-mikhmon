/devices/{device_id}/stream/system/resource:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IntervalQuery'
  get:
    tags: [Streaming]
    summary: Stream resource snapshot (SSE polling)
    description: |
      Polling `/system/resource` per `?interval=` (default `2s`). Event
      `resource` dengan payload `SystemResourceResponse` lengkap.
    x-event-types: [resource]
    responses:
      '200':
        description: SSE stream
        content:
          text/event-stream:
            schema: { $ref: '../schemas/system.yaml#/SystemResourceResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorDeviceNotFound' }

/devices/{device_id}/stream/network/interfaces/{name}/traffic:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - name: name
      in: path
      required: true
      description: Nama interface (mis. `ether1`, `wlan1`).
      schema: { type: string, example: "ether1" }
  get:
    tags: [Streaming]
    summary: Stream interface traffic (SSE inherent)
    description: |
      Inherent stream `/interface/monitor-traffic interface=<name>`.
      Update natural per detik dari RouterOS. Event `traffic` dengan
      payload bit/packet per detik.
    x-event-types: [traffic]
    responses:
      '200':
        description: SSE stream
        content:
          text/event-stream:
            schema: { $ref: '../schemas/network.yaml#/TrafficResponse' }
      '404': { $ref: '../components/responses.yaml#/ErrorDeviceNotFound' }

/devices/{device_id}/stream/network/interfaces/stats:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IntervalQuery'
  get:
    tags: [Streaming]
    summary: Stream interface stats (SSE polling)
    description: |
      Polling `/interface/print stats` per `?interval=` (default `2s`).
      Event `stats` dengan counter byte/packet kumulatif sejak boot —
      frontend hitung delta untuk plot rate.
    x-event-types: [stats]
    responses:
      '200':
        description: SSE stream
        content:
          text/event-stream:
            schema: { $ref: '../schemas/stream-events.yaml#/InterfaceStatsEvent' }
      '404': { $ref: '../components/responses.yaml#/ErrorDeviceNotFound' }

/devices/{device_id}/stream/network/queues/stats:
  parameters:
    - $ref: '../components/parameters.yaml#/DeviceIdPath'
    - $ref: '../components/parameters.yaml#/IntervalQuery'
  get:
    tags: [Streaming]
    summary: Stream queue stats (SSE polling)
    description: |
      Polling `/queue/simple/print stats` per `?interval=` (default `1s`).
      Payload diparse ke `QueueStatsEvent` lengkap. Field counter tetap
      memakai format RouterOS `"in/out"` saat RouterOS mengembalikannya
      sebagai pasangan arah.
    x-event-types: [stats]
    responses:
      '200':
        description: SSE stream
        content:
          text/event-stream:
            schema: { $ref: '../schemas/stream-events.yaml#/QueueStatsEvent' }
      '404': { $ref: '../components/responses.yaml#/ErrorDeviceNotFound' }
