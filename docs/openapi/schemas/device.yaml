DeviceResponse:
  type: object
  description: |
    Representasi device (RouterOS instance) yang ter-register di service.
    Password sengaja TIDAK di-expose; hanya disimpan di DB dan dikirim ke
    router saat dial.
  required: [id, display_name, address, username, use_tls, status, expiry_check_interval, active, created_at]
  properties:
    id:
      type: integer
      format: int64
      example: 1
    display_name:
      type: string
      example: "RB Main Office"
    address:
      type: string
      description: "host:port — `8728` untuk API, `8729` untuk API-SSL."
      example: "192.168.88.1:8728"
    username:
      type: string
      example: "admin"
    use_tls:
      type: boolean
      example: false
    status:
      type: string
      description: Status koneksi terakhir.
      enum: [connected, disconnected, error]
      example: "connected"
    last_seen:
      type: string
      format: date-time
      nullable: true
      description: Waktu terakhir status `connected` di-set.
    last_error:
      type: string
      description: Pesan error terakhir (kosong kalau healthy).
    expiry_check_interval:
      type: string
      description: Interval expiry-checker untuk device ini (Go duration).
      example: "2m"
    active:
      type: boolean
      description: Kalau false, expiry checker & auto-reconnect dimatikan.
    created_at:
      type: string
      format: date-time

DeviceCreateRequest:
  type: object
  description: Body POST /devices.
  required: [display_name, address, username, password]
  properties:
    display_name:
      type: string
      minLength: 1
      maxLength: 128
      example: "RB Main Office"
    address:
      type: string
      example: "192.168.88.1:8728"
    username:
      type: string
      example: "admin"
    password:
      type: string
      format: password
      example: "secret123"
    use_tls:
      type: boolean
      default: false
    expiry_check_interval:
      type: string
      description: Go duration. Default `2m` kalau kosong.
      example: "2m"

DeviceUpdateRequest:
  type: object
  description: Body PUT /devices/{device_id}. Semua field opsional (sparse update).
  properties:
    display_name:
      type: string
    address:
      type: string
    username:
      type: string
    password:
      type: string
      format: password
    use_tls:
      type: boolean
      nullable: true
    expiry_check_interval:
      type: string
    active:
      type: boolean
      nullable: true

DeviceWriteResponse:
  type: object
  description: |
    Response create/update. Kalau dial gagal (credential salah / router
    unreachable), record tetap disimpan di DB tapi `warning` di-isi supaya
    frontend bisa tampilkan notice tanpa kehilangan device.
  required: [device]
  properties:
    device:
      $ref: '#/DeviceResponse'
    warning:
      type: string
      example: "device saved but connection failed: dial tcp 192.168.88.1:8728: connect: no route to host"
