# Typed payload untuk SSE stream. Tiap object adalah body satu event
# `data:` di stream. Frontend parse via `JSON.parse(event.data)`.

HotspotActiveEvent:
  type: object
  description: |
    Event delta dari /stream/hotspot/active. Kalau `dead=true`, session
    telah terminate; ID-nya valid untuk cross-ref ke snapshot terakhir
    tapi field lain mungkin kosong.
  required: [id, user, bytes_in, bytes_out, dead]
  properties:
    id:          { type: string, example: "*1" }
    user:        { type: string, example: "user01" }
    address:     { type: string, example: "10.0.0.5" }
    mac_address: { type: string, example: "AA:BB:CC:DD:EE:FF" }
    server:      { type: string, example: "hotspot1" }
    login_by:    { type: string, example: "http-pap" }
    bytes_in:    { type: integer, format: int64 }
    bytes_out:   { type: integer, format: int64 }
    uptime:      { type: string, example: "12s" }
    dead:
      type: boolean
      description: "true = session terminated."

PPPActiveEvent:
  type: object
  required: [id, name, dead]
  properties:
    id:        { type: string, example: "*1" }
    name:      { type: string, example: "pppoe-user01" }
    service:   { type: string }
    caller_id: { type: string }
    address:   { type: string }
    uptime:    { type: string }
    dead:      { type: boolean, description: "true = session terminated." }

PPPSecretEvent:
  type: object
  description: |
    Event delta dari /stream/ppp/secrets. Kalau `dead=true`, row secret
    telah dihapus dari table.
  required: [id, name, limit_bytes_in, limit_bytes_out, disabled, dead]
  properties:
    id:                     { type: string, example: "*1" }
    name:                   { type: string, example: "pppoe-user01" }
    service:                { type: string, example: "pppoe" }
    profile:                { type: string, example: "default" }
    limit_bytes_in:         { type: integer, format: int64, example: 0 }
    limit_bytes_out:        { type: integer, format: int64, example: 0 }
    last_logged_out:        { type: string, example: "may/20/2026 10:00:00" }
    last_caller_id:         { type: string, example: "AA:BB:CC:DD:EE:FF" }
    last_disconnect_reason: { type: string, example: "user-request" }
    disabled:               { type: boolean }
    comment:                { type: string }
    dead:                   { type: boolean, description: "true = row deleted." }

HotspotUserEvent:
  type: object
  description: |
    Event delta dari /stream/hotspot/users. Kalau `dead=true`, row user
    telah dihapus dari table.
  required: [id, name, disabled, dead]
  properties:
    id:          { type: string, example: "*1" }
    name:        { type: string, example: "user01" }
    profile:     { type: string, example: "default" }
    mac_address: { type: string, example: "AA:BB:CC:DD:EE:FF" }
    address:     { type: string, example: "10.0.0.5" }
    email:       { type: string, example: "user01@example.test" }
    server:      { type: string, example: "hotspot1" }
    disabled:    { type: boolean }
    comment:     { type: string }
    dead:        { type: boolean, description: "true = row deleted." }

PPPInactiveEvent:
  type: object
  description: |
    Derived inactive PPP event dari enabled secrets minus active sessions.
    Field `address` = last-known IP dari /ppp/active (kosong kalau secret
    belum pernah aktif sejak workflow start).
  required: [name, action]
  properties:
    name:                   { type: string, example: "pppoe-user01" }
    profile:                { type: string, example: "default" }
    caller_id:              { type: string, example: "AA:BB:CC:DD:EE:FF" }
    last_caller_id:         { type: string, example: "AA:BB:CC:DD:EE:FF" }
    last_logged_out:        { type: string, example: "may/20/2026 10:00:00" }
    last_disconnect_reason: { type: string, example: "user-request" }
    address:                { type: string, example: "10.0.0.5", description: "Last-known IP dari /ppp/active." }
    action:
      type: string
      enum: [added, removed, changed]
      example: added

HotspotInactiveEvent:
  type: object
  description: Derived inactive hotspot event dari enabled users minus active sessions.
  required: [user, action]
  properties:
    user:
      $ref: '#/HotspotUserEvent'
    action:
      type: string
      enum: [added, removed, changed]
      example: added

LogEvent:
  type: object
  description: Satu entry log dari /stream/log.
  required: [id, time, topics, message]
  properties:
    id:      { type: string, example: "*1234" }
    time:    { type: string, example: "10:30:21" }
    topics:  { type: string, example: "hotspot,info,account" }
    message: { type: string, example: "user01 logged in" }

InterfaceStatsEvent:
  type: object
  description: |
    Stats interface polled per interval (default 2s) di /stream/network/interfaces/stats.
    Counter kumulatif sejak boot; frontend hitung delta untuk plot.
  required: [id, name, type, rx_byte, tx_byte, rx_packet, tx_packet, running, disabled]
  properties:
    id:       { type: string, example: "*1" }
    name:     { type: string, example: "ether1" }
    type:     { type: string, example: "ether" }
    rx_byte:  { type: integer, format: int64 }
    tx_byte:  { type: integer, format: int64 }
    rx_packet: { type: integer, format: int64 }
    tx_packet: { type: integer, format: int64 }
    running:  { type: boolean }
    disabled: { type: boolean }

PingEvent:
  type: object
  description: Satu reply ICMP dari /stream/ping.
  required: [seq, host, size, time_ms]
  properties:
    seq:     { type: integer, example: 0 }
    host:    { type: string, example: "8.8.8.8" }
    size:    { type: integer, example: 56 }
    ttl:     { type: integer, example: 115 }
    time_ms: { type: number, format: float, example: 24 }
    status:  { type: string, example: "" }

QueueStatsEvent:
  type: object
  description: |
    Stats queue per interval (default 1s) di /stream/network/queues/stats.
    Payload sudah diparse dari domain.QueueSimpleWithStats; field counter
    tetap string mengikuti format RouterOS.
  required: [id, name, target, disabled, dynamic, bytes, packets, rate]
  properties:
    id:                   { type: string, example: "*1" }
    name:                 { type: string, example: "<hotspot-user01>" }
    target:               { type: string, example: "10.0.0.5/32" }
    parent:               { type: string }
    disabled:             { type: boolean }
    dynamic:              { type: boolean }
    comment:              { type: string }
    bytes:                { type: string, example: "1234/5678" }
    packets:              { type: string, example: "10/15" }
    rate:                 { type: string, example: "200/300" }
    total_rate:           { type: string, example: "500" }
    packet_rate:          { type: string, example: "1/2" }
    total_packet_rate:    { type: string, example: "3" }
    queued_bytes:         { type: string, example: "0/0" }
    total_queued_bytes:   { type: string, example: "0" }
    queued_packets:       { type: string, example: "0/0" }
    total_queued_packets: { type: string, example: "0" }
    total_bytes:          { type: string, example: "6801" }
    total_packets:        { type: string, example: "25" }
    dropped:              { type: string, example: "0/0" }
    total_dropped:        { type: string, example: "0" }
    max_limit:            { type: string, example: "2M/2M" }

RouterboardEvent:
  type: object
  description: Event dari /stream/system/routerboard — board info & firmware.
  required: [routerboard]
  properties:
    routerboard:      { type: boolean, example: true }
    board_name:       { type: string, example: "RB951G-2HnD" }
    model:            { type: string, example: "951G-2HnD" }
    revision:         { type: string, example: "r2" }
    serial_number:    { type: string, example: "1234567890AB" }
    firmware_type:    { type: string, example: "ar9344" }
    current_firmware: { type: string, example: "7.13" }
    upgrade_firmware: { type: string, example: "7.13" }
