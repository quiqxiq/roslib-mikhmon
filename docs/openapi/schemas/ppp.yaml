PPPSecretResponse:
  type: object
  description: |
    PPP secret (credential PPPoE/L2TP). Password TIDAK pernah di-expose
    di response. Untuk toggle disabled, pakai PATCH /secrets/{id}/disabled.
  required: [id, name, limit_bytes_in, limit_bytes_out, disabled]
  properties:
    id:                     { type: string, example: "*1" }
    name:                   { type: string, example: "pppoe-user01" }
    service:                { type: string, example: "pppoe" }
    profile:                { type: string, example: "default" }
    local_address:          { type: string, example: "10.0.0.1" }
    remote_address:         { type: string, example: "10.0.0.10" }
    limit_bytes_in:         { type: integer, format: int64, example: 0, description: "Quota inbound total bytes; 0 = unlimited." }
    limit_bytes_out:        { type: integer, format: int64, example: 0, description: "Quota outbound total bytes; 0 = unlimited." }
    last_logged_out:        { type: string, example: "may/20/2026 10:00:00" }
    last_caller_id:         { type: string, example: "AA:BB:CC:DD:EE:FF" }
    last_disconnect_reason: { type: string, example: "user-request" }
    disabled:               { type: boolean }
    comment:                { type: string }

PPPSecretCreateRequest:
  type: object
  description: |
    Form field create PPP secret. Toggle disabled lewat
    PATCH /secrets/{id}/disabled; comment di-set lewat UpdateRequest.
  required: [name]
  properties:
    name:            { type: string, minLength: 1, maxLength: 128, example: "pppoe-user01" }
    password:        { type: string, format: password }
    service:         { type: string, example: "pppoe", description: "pppoe | l2tp | pptp | ovpn | sstp | any" }
    profile:         { type: string, example: "default" }
    local_address:   { type: string, example: "10.0.0.1" }
    remote_address:  { type: string, example: "10.0.0.10" }
    limit_bytes_in:  { type: integer, format: int64, example: 0, description: "0 = unlimited." }
    limit_bytes_out: { type: integer, format: int64, example: 0 }

PPPSecretUpdateRequest:
  type: object
  description: |
    Sparse update — field yang tidak di-set tidak diubah. limit_bytes_in /
    limit_bytes_out pakai nullable untuk membedakan "tidak diubah" (null)
    dengan "reset ke 0/unlimited" (0).
  properties:
    name:            { type: string }
    password:        { type: string, format: password }
    service:         { type: string }
    profile:         { type: string }
    local_address:   { type: string }
    remote_address:  { type: string }
    limit_bytes_in:  { type: integer, format: int64, nullable: true }
    limit_bytes_out: { type: integer, format: int64, nullable: true }

PPPProfileResponse:
  type: object
  required: [id, name, disabled]
  properties:
    id:              { type: string, example: "*1" }
    name:            { type: string, example: "default" }
    local_address:   { type: string }
    remote_address:  { type: string }
    rate_limit:      { type: string, example: "10M/10M", description: "Format rx/tx." }
    session_timeout: { type: string, example: "1h30m", description: "RouterOS duration." }
    idle_timeout:    { type: string, example: "10m" }
    parent_queue:    { type: string, example: "global" }
    on_up:           { type: string, description: "Script optional dijalankan saat session up." }
    on_down:         { type: string, description: "Script optional dijalankan saat session down." }
    disabled:        { type: boolean }
    comment:         { type: string }

PPPProfileCreateRequest:
  type: object
  required: [name]
  properties:
    name:            { type: string, minLength: 1, maxLength: 128, example: "vip" }
    local_address:   { type: string }
    remote_address:  { type: string }
    rate_limit:      { type: string, example: "10M/10M" }
    session_timeout: { type: string, example: "1h30m" }
    idle_timeout:    { type: string, example: "10m" }
    parent_queue:    { type: string }
    on_up:           { type: string }
    on_down:         { type: string }
    disabled:        { type: boolean, nullable: true }
    comment:         { type: string }

PPPProfileUpdateRequest:
  type: object
  description: Sparse update — field yang tidak di-set tidak diubah.
  properties:
    name:            { type: string }
    local_address:   { type: string }
    remote_address:  { type: string }
    rate_limit:      { type: string }
    session_timeout: { type: string, nullable: true }
    idle_timeout:    { type: string, nullable: true }
    parent_queue:    { type: string, nullable: true }
    on_up:           { type: string, nullable: true }
    on_down:         { type: string, nullable: true }
    disabled:        { type: boolean, nullable: true }
    comment:         { type: string, nullable: true }

PPPActiveResponse:
  type: object
  description: |
    Session PPP aktif. Field paling penting untuk UI monitoring:
    uptime, address, caller_id.
  required: [id, name]
  properties:
    id:              { type: string, example: "*1" }
    name:            { type: string, example: "pppoe-user01" }
    service:         { type: string, example: "pppoe" }
    caller_id:       { type: string, example: "AA:BB:CC:DD:EE:FF" }
    address:         { type: string, example: "10.0.0.10" }
    uptime:          { type: string, example: "1h23m" }
    limit_bytes_in:  { type: integer, format: int64 }
    limit_bytes_out: { type: integer, format: int64 }
    comment:         { type: string }
