run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
        disabled: true   # godoc requirement di-handle manual via review

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, revive]
    - path: internal/tcpmock/
      linters: [errcheck]
